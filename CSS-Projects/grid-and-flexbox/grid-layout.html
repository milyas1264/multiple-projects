<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="grid.css">
    <title>CSS Grid Layout</title>
  
  </head>
  <body>
    <h1>CSS Grid Layout Examples</h1>

    <div class="grid-container">
      <div class="grid-item featured">
        <h2>Featured Item</h2>
        <p>Spans 2 columns</p>
      </div>
      <div class="grid-item">
        <h2>Card 2</h2>
        <p>Standard item</p>
      </div>
      <div class="grid-item tall">
        <h2>Tall Card</h2>
        <p>Spans 2 rows</p>
      </div>
      <div class="grid-item">
        <h2>Card 4</h2>
        <p>Standard item</p>
      </div>
      <div class="grid-item">
        <h2>Card 5</h2>
        <p>Standard item</p>
      </div>
      <div class="grid-item">
        <h2>Card 6</h2>
        <p>Standard item</p>
      </div>
    </div>

    <h1 style="margin-top: 60px">Fixed Column Grid</h1>

    <div class="fixed-grid">
      <div class="grid-item">
        <h2>Item 1</h2>
      </div>
      <div class="grid-item">
        <h2>Item 2</h2>
      </div>
      <div class="grid-item">
        <h2>Item 3</h2>
      </div>
      <div class="grid-item">
        <h2>Item 4</h2>
      </div>
      <div class="grid-item">
        <h2>Item 5</h2>
      </div>
      <div class="grid-item">
        <h2>Item 6</h2>
      </div>
    </div>

    <a href="../index.html" id="bkto">BACK TO HOME</a>
  </body>
</html>
